# Configuration Railway / Nixpacks pour Laravel
[phases.setup]
nixPkgs = ["php82", "php82Extensions.fileinfo", "php82Extensions.gd", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.zip", "php82Extensions.xml", "php82Extensions.bcmath", "php82Packages.composer"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader --no-interaction"]

[phases.build]
cmds = [
  "php artisan storage:link || true",
  "php artisan config:cache",
  "php artisan route:cache",
  "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && php -S 0.0.0.0:$PORT -t public public/index.php"
